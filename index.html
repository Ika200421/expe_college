<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【動作確認用】時間長知覚 予備実験1</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f5f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
            padding: 20px;
            box-sizing: border-box;
        }
        #screen {
            width: 100%;
            max-width: 640px;
            min-height: 450px;
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            box-sizing: border-box;
            position: relative;
        }
        #stimulus {
            width: 140px;
            height: 140px;
            background-color: #000000;
            border-radius: 50%;
            display: none;
        }
        .text-container {
            font-size: 18px;
            line-height: 1.7;
            text-align: left;
            width: 100%;
            margin-bottom: 20px;
        }
        #text-display {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            width: 100%;
            word-break: break-all;
        }
        .btn-container {
            display: flex;
            gap: 16px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        button {
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background-color: #0071e3;
            color: white;
            transition: background 0.2s, transform 0.1s;
        }
        button:hover {
            background-color: #005bb5;
        }
        button:active {
            transform: scale(0.98);
        }
        .form-group {
            margin-bottom: 20px;
            width: 100%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .form-group label {
            font-size: 15px;
            font-weight: bold;
        }
        .form-group select, .form-group input {
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
        }
        .key-hint {
            display: block;
            font-size: 12px;
            font-weight: normal;
            color: #eaeaea;
            margin-top: 4px;
        }
        @media (max-width: 480px) {
            #screen { padding: 20px; min-height: 400px; }
            .btn-container { flex-direction: column; width: 100%; }
            button { width: 100%; }
            .key-hint { display: none; }
        }
    </style>
</head>
<body>

<div id="screen">
    <div id="step-profile" style="display: flex; flex-direction: column; align-items: center; width: 100%;">
        <h2 style="margin-top:0;">【テスト用】実験前に</h2>
        <div class="form-group">
            <label for="gender">性別</label>
            <select id="gender" required>
                <option value="">選択してください</option>
                <option value="test_male">テスト男性</option>
                <option value="test_female">テスト女性</option>
            </select>
        </div>
        <div class="form-group">
            <label for="age">年齢</label>
            <input type="number" id="age" value="99" required>
        </div>
        <button onclick="goToInstruction()">次へ進む</button>
    </div>

    <div id="step-instruction" style="display: none; flex-direction: column; align-items: center; width: 100%;">
        <h2 style="margin-top:0;">動作テストの説明</h2>
        <div class="text-container">
            <p style="color: red; font-weight: bold; text-align: center;">※これは1回のみで終了する動作確認用ページです。</p>
            <p>「実験を開始する」を押すと、3秒カウント後に1回だけ円が表示されます。回答後、スプレッドシートにデータが飛ぶか確認してください。</p>
        </div>
        <button onclick="startExperiment()">理解しました（テスト開始）</button>
    </div>
    
    <div id="text-display" style="display: none;"></div>
    <div id="stimulus"></div>
    <div id="button-container" class="btn-container" style="display: none;">
        <button id="btn-short" onclick="recordResponse('short')">
            3秒より短かった
            <span class="key-hint">[A] キー</span>
        </button>
        <button id="btn-long" onclick="recordResponse('long')">
            3秒より長かった
            <span class="key-hint">[D] キー</span>
        </button>
    </div>
</div>

<script>
    // ★ここに取得したGASのウェブアプリURLを貼り付けてください
    const gasUrl = "https://script.google.com/macros/s/AKfycbz9DtUBJfplWZ0Dfrv5oHQyihkOadEinSKWukcGmyjhxN8_Rn_3vhSjTcHxW0umLgOTZw/exec";

    // テスト用に1回（3.0秒）だけの配列にする
    let trials = [3.0]; 
    let currentTrialIndex = 0;
    let results = [];
    let userGender = "";
    let userAge = "";
    let userDevice = "PC";
    let isWaitingForResponse = false;

    const stepProfile = document.getElementById('step-profile');
    const stepInstruction = document.getElementById('step-instruction');
    const textDisplay = document.getElementById('text-display');
    const stimulus = document.getElementById('stimulus');
    const buttonContainer = document.getElementById('button-container');

    if (/Mobi|Android|iPhone/i.test(navigator.userAgent)) {
        userDevice = "Smartphone";
    }

    function goToInstruction() {
        userGender = document.getElementById('gender').value;
        userAge = document.getElementById('age').value;
        if (!userGender || !userAge) {
            alert("性別と年齢を入力してください。");
            return;
        }
        stepProfile.style.display = 'none';
        stepInstruction.style.display = 'flex';
    }

    function startExperiment() {
        stepInstruction.style.display = 'none';
        nextTrial();
    }

    function nextTrial() {
        if (currentTrialIndex >= trials.length) {
            sendDataToGAS();
            return;
        }

        isWaitingForResponse = false;
        textDisplay.style.display = 'block';
        buttonContainer.style.display = 'none';
        stimulus.style.display = 'none';

        let countdown = 3;
        textDisplay.textContent = countdown;
        
        let countdownInterval = setInterval(() => {
            countdown--;
            if (countdown > 0) {
                textDisplay.textContent = countdown;
            } else {
                clearInterval(countdownInterval);
                textDisplay.style.display = 'none';
                showStimulus(trials[currentTrialIndex]);
            }
        }, 1000);
    }

    function showStimulus(durationSeconds) {
        stimulus.style.display = 'block';
        setTimeout(() => {
            stimulus.style.display = 'none';
            buttonContainer.style.display = 'flex';
            isWaitingForResponse = true;
        }, durationSeconds * 1000);
    }

    function recordResponse(response) {
        if (!isWaitingForResponse) return;
        isWaitingForResponse = false;

        const targetDuration = trials[currentTrialIndex];
        let isCorrect = -1; // 3.0秒ちょうどなので基準値の-1

        results.push({
            trial: currentTrialIndex + 1,
            duration: targetDuration,
            response: response,
            isCorrect: isCorrect
        });

        currentTrialIndex++;
        nextTrial();
    }

    window.addEventListener('keydown', (event) => {
        if (!isWaitingForResponse) return;
        if (event.key === 'a' || event.key === 'A') {
            recordResponse('short');
        } else if (event.key === 'd' || event.key === 'D') {
            recordResponse('long');
        }
    });

    function sendDataToGAS() {
        textDisplay.style.display = 'block';
        buttonContainer.style.display = 'none';
        textDisplay.innerHTML = "テスト送信中...<br><br><span style='font-size:16px; font-weight:normal; color:#666;'>画面を閉じずに少々お待ちください...</span>";

        const payload = {
            gender: userGender,
            age: userAge,
            device: userDevice,
            results: results
        };

        fetch(gasUrl, {
            method: "POST",
            mode: "no-cors",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        })
        .then(() => {
            textDisplay.innerHTML = "テストデータの送信完了！<br><br><span style='font-size:16px; font-weight:normal; color:#666;'>Googleスプレッドシートを開いて、データが1行追加されているか確認してください。</span>";
        })
        .catch(error => {
            console.error("Error:", error);
            textDisplay.innerHTML = "送信エラーが発生しました。";
        });
    }
</script>

</body>
</html>
