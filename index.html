<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>時間長知覚 予備実験2（映像選定）</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f5f7;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }
        #screen {
            width: 760px;
            min-height: 520px;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 24px;
            box-sizing: border-box;
        }
        #stimulus-video {
            width: 700px;
            height: 394px;
            background-color: #000;
            display: none;
            object-fit: contain;
            border-radius: 8px;
        }
        #text-display {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            line-height: 1.6;
        }
        #button-container {
            display: none;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        button {
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            background-color: #0071e3;
            color: white;
            transition: background 0.2s;
        }
        button:hover { background-color: #005bb5; }
        button:disabled { background-color: #999; cursor: not-allowed; }
        .form-group {
            margin-bottom: 18px;
            width: 100%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .form-group label { font-size: 16px; font-weight: bold; }
        .form-group select, .form-group input {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
        .small-note {
            font-size: 14px;
            color: #666;
            line-height: 1.5;
            max-width: 560px;
            text-align: left;
            margin-bottom: 18px;
        }
    </style>
</head>
<body>

<div id="screen">
    <div id="profile-form" style="display: flex; flex-direction: column; align-items: center; width: 100%;">
        <h2>時間長知覚 予備実験2</h2>
        <p class="small-note">
            3カウント後に映像が短時間再生されます。<br>
            映像の再生時間が「3秒より短かった」か「3秒より長かった」かを直感で回答してください。<br>
            ※この実験では動画の音声は自動的に無音になります。
        </p>
        <div class="form-group">
            <label for="gender">性別</label>
            <select id="gender" required>
                <option value="">選択してください</option>
                <option value="male">男性</option>
                <option value="female">女性</option>
                <option value="other">その他・答えたくない</option>
            </select>
        </div>
        <div class="form-group">
            <label for="age">年齢</label>
            <input type="number" id="age" min="0" max="120" placeholder="半角数字で入力" required>
        </div>
        <button id="start-btn" onclick="validateAndStart()">実験を開始する</button>
    </div>

    <div id="text-display" style="display: none;"></div>
    <video id="stimulus-video" playsinline preload="auto" muted></video>
    <div id="button-container">
        <button onclick="recordResponse('short')">3秒より短かった</button>
        <button onclick="recordResponse('long')">3秒より長かった</button>
    </div>
</div>

<script>
    // ★ここに取得したGASのウェブアプリURLを貼り付けてください
    const gasUrl = "https://script.google.com/macros/s/AKfycbyUI3KYjzrs1aOhDCSAs62pcVr5_BcDCavOWcKiEBl9-r2Uqa2MqXKrPt-B44CzXDxWvw/exec";

    // ===== 実験設定 =====
    // 予備実験1の結果をもとに、2.6秒〜3.3秒を0.1秒刻みにする
    const minTime = 2.6;
    const maxTime = 3.3;
    const step = 0.1;

    // 同じ「映像×秒数」を何回ずつ出すか
    // 多すぎる場合は 1 に変更してください
    const trialsPerCondition = 1;

    // 使用する動画ファイル名をここに追加してください。
    // このHTMLファイルと同じフォルダに動画を置く場合は、例のようにファイル名だけでOKです。
    const videoFiles = [
        { id: "city", label: "都会の動画", src: "videos/city.mp4(1)", condition: "city" },
        { id: "koi", label: "鯉の動画", src: "videos/koi.mp4(1)", condition: "koi" },
        { id: "park", label: "公園の動画", src: "videos/park.mp4(1)", condition: "park" },
        { id: "people", label: "人の動画", src: "videos/people.mp4(1)", condition: "people" }
    ];

    let trials = [];
    let currentTrialIndex = 0;
    let results = [];
    let userGender = "";
    let userAge = "";
    let trialStartTime = 0;
    let responseStartTime = 0;

    const profileForm = document.getElementById('profile-form');
    const textDisplay = document.getElementById('text-display');
    const video = document.getElementById('stimulus-video');
    const buttonContainer = document.getElementById('button-container');
    const startBtn = document.getElementById('start-btn');

    function validateAndStart() {
        userGender = document.getElementById('gender').value;
        userAge = document.getElementById('age').value;

        if (!userGender || !userAge) {
            alert("性別と年齢を正しく入力してください。");
            return;
        }
        if (videoFiles.length === 0) {
            alert("videoFiles に使用する動画を1つ以上設定してください。");
            return;
        }

        startBtn.disabled = true;
        profileForm.style.display = 'none';
        initExperiment();
        nextTrial();
    }

    function initExperiment() {
        const conditionTimes = [];
        for (let t = minTime; t <= maxTime + 0.0001; t = parseFloat((t + step).toFixed(1))) {
            conditionTimes.push(t);
        }

        for (let repeat = 0; repeat < trialsPerCondition; repeat++) {
            for (const vf of videoFiles) {
                for (const duration of conditionTimes) {
                    trials.push({
                        videoId: vf.id,
                        videoLabel: vf.label,
                        videoSrc: vf.src,
                        videoCondition: vf.condition,
                        duration: duration,
                        repeat: repeat + 1
                    });
                }
            }
        }

        shuffle(trials);
    }

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function nextTrial() {
        if (currentTrialIndex >= trials.length) {
            sendDataToGAS();
            return;
        }

        textDisplay.style.display = 'block';
        buttonContainer.style.display = 'none';
        video.style.display = 'none';
        video.pause();
        video.removeAttribute('src');
        video.load();

        const total = trials.length;
        const current = currentTrialIndex + 1;
        let countdown = 3;
        textDisplay.innerHTML = `試行 ${current} / ${total}<br><br>${countdown}`;

        const countdownInterval = setInterval(() => {
            countdown--;
            if (countdown > 0) {
                textDisplay.innerHTML = `試行 ${current} / ${total}<br><br>${countdown}`;
            } else {
                clearInterval(countdownInterval);
                textDisplay.style.display = 'none';
                showVideo(trials[currentTrialIndex]);
            }
        }, 1000);
    }

    async function showVideo(trial) {
        trialStartTime = performance.now();
        video.src = trial.videoSrc;
        video.muted = true;
        video.volume = 0;
        video.currentTime = 0;
        video.style.display = 'block';

        try {
            await video.play();
        } catch (error) {
            console.error(error);
            video.style.display = 'none';
            textDisplay.style.display = 'block';
            textDisplay.innerHTML = "動画を再生できませんでした。<br>動画ファイル名や保存場所を確認してください。";
            return;
        }

        setTimeout(() => {
            video.pause();
            video.style.display = 'none';
            responseStartTime = performance.now();
            buttonContainer.style.display = 'flex';
        }, trial.duration * 1000);
    }

    function recordResponse(response) {
        const trial = trials[currentTrialIndex];
        let isCorrect = 0;
        if (trial.duration < 3.0 && response === 'short') isCorrect = 1;
        if (trial.duration > 3.0 && response === 'long') isCorrect = 1;
        if (trial.duration === 3.0) isCorrect = -1; // 3.0秒は長短の正解を決めない

        const responseTimeMs = Math.round(performance.now() - responseStartTime);
        const actualPlayedMs = Math.round(responseStartTime - trialStartTime);

        results.push({
            trial: currentTrialIndex + 1,
            videoId: trial.videoId,
            videoLabel: trial.videoLabel,
            videoSrc: trial.videoSrc,
            videoCondition: trial.videoCondition,
            duration: trial.duration,
            repeat: trial.repeat,
            response: response,
            isCorrect: isCorrect,
            responseTimeMs: responseTimeMs,
            actualPlayedMs: actualPlayedMs
        });

        currentTrialIndex++;
        nextTrial();
    }

    function sendDataToGAS() {
        textDisplay.style.display = 'block';
        buttonContainer.style.display = 'none';
        video.style.display = 'none';
        textDisplay.innerHTML = "実験終了です。<br>データを送信しています。画面を閉じずにお待ちください...";

        const payload = {
            experimentName: "pre_experiment_2_video_selection",
            gender: userGender,
            age: userAge,
            minTime: minTime,
            maxTime: maxTime,
            step: step,
            trialsPerCondition: trialsPerCondition,
            results: results
        };

        fetch(gasUrl, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        })
        .then(() => {
            textDisplay.innerHTML = "データの送信が完了しました！<br>ご協力ありがとうございました。";
        })
        .catch(error => {
            console.error("Error:", error);
            textDisplay.innerHTML = "データの送信中にエラーが発生しました。<br>お手数ですが管理者に連絡してください。";
        });
    }
</script>

</body>
</html>
